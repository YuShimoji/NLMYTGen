<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>NLMYTGen</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>NLMYTGen</h1>
    <nav>
      <button class="tab active" data-tab="csv">CSV 変換</button>
      <button class="tab" data-tab="production">演出適用</button>
      <button class="tab" data-tab="scoring">品質診断</button>
    </nav>
  </header>

  <main>
    <!-- CSV 変換タブ -->
    <section id="tab-csv" class="tab-content active">
      <div id="drop-zone" class="drop-zone">
        <p>台本 .txt をここにドラッグ&ドロップ</p>
        <p class="hint">または <button id="btn-select-txt">ファイルを選択</button></p>
        <p id="selected-file" class="file-path"></p>
      </div>

      <div class="settings-group">
        <h3>設定</h3>
        <div class="setting-row">
          <label for="speaker-map">Speaker Map</label>
          <input type="text" id="speaker-map" value="スピーカー1=れいむ,スピーカー2=まりさ">
        </div>
        <div class="setting-row">
          <label for="max-lines">Max Lines</label>
          <input type="number" id="max-lines" value="2" min="1" max="5">
        </div>
        <div class="setting-row">
          <label for="chars-per-line">Chars/Line</label>
          <input type="number" id="chars-per-line" value="40" min="20" max="80">
        </div>
        <div class="setting-row">
          <label>
            <input type="checkbox" id="reflow-v2" checked> Reflow v2
          </label>
        </div>
      </div>

      <div class="action-row">
        <button id="btn-build-csv" class="primary" disabled>Build CSV</button>
        <button id="btn-dry-run">Dry Run</button>
        <button id="btn-open-output" class="hidden">出力フォルダを開く</button>
      </div>

      <div id="csv-result" class="result-panel hidden"></div>
    </section>

    <!-- 演出適用タブ -->
    <section id="tab-production" class="tab-content">
      <div class="file-select-group">
        <div class="file-row">
          <label>Production .ymmp</label>
          <button class="btn-file" data-target="prod-ymmp">選択</button>
          <span id="prod-ymmp-path" class="file-path">未選択</span>
        </div>
        <div class="file-row">
          <label>IR JSON</label>
          <button class="btn-file" data-target="ir-json">選択</button>
          <span id="ir-json-path" class="file-path">未選択</span>
        </div>

        <div class="ir-paste-group">
          <label>または IR を貼り付け:</label>
          <textarea id="ir-paste" rows="4" placeholder="Custom GPT の IR JSON 出力をここに貼り付け → 保存ボタンで .json に書き出し"></textarea>
          <button id="btn-save-ir">IR を JSON に保存</button>
        </div>

        <div class="file-row">
          <label>Palette .ymmp</label>
          <button class="btn-file" data-target="palette">選択</button>
          <span id="palette-path" class="file-path">未選択</span>
        </div>
        <div class="file-row">
          <label>CSV (row-range)</label>
          <button class="btn-file" data-target="csv-file">選択</button>
          <span id="csv-file-path" class="file-path">未選択</span>
        </div>
        <div class="file-row">
          <label>BG Map</label>
          <button class="btn-file" data-target="bg-map">選択</button>
          <span id="bg-map-path" class="file-path">未選択</span>
        </div>
      </div>

      <div class="action-row">
        <button id="btn-validate-ir" disabled>Validate IR</button>
        <button id="btn-apply" class="primary" disabled>Apply Production</button>
        <button id="btn-apply-dry">Dry Run</button>
        <button id="btn-open-patched" class="hidden">出力フォルダを開く</button>
      </div>

      <div id="validate-result" class="result-panel hidden"></div>
      <div id="production-result" class="result-panel hidden"></div>
    </section>

    <!-- 品質診断タブ -->
    <section id="tab-scoring" class="tab-content">
      <div class="file-row">
        <label>Packaging Brief</label>
        <button class="btn-file" data-target="scoring-brief">選択</button>
        <span id="scoring-brief-path" class="file-path">未選択</span>
      </div>

      <div class="scoring-group">
        <h3>H-04 Evidence Richness</h3>
        <div class="score-grid">
          <label>number <input type="number" id="ev-number" value="2" min="0" max="3"></label>
          <label>named_entity <input type="number" id="ev-named_entity" value="2" min="0" max="3"></label>
          <label>anecdote <input type="number" id="ev-anecdote" value="1" min="0" max="3"></label>
          <label>case <input type="number" id="ev-case" value="2" min="0" max="3"></label>
          <label>study <input type="number" id="ev-study" value="2" min="0" max="3"></label>
          <label>freshness <input type="number" id="ev-freshness" value="1" min="0" max="3"></label>
          <label>promise_payoff <input type="number" id="ev-promise_payoff" value="2" min="0" max="3"></label>
        </div>
        <button id="btn-score-evidence">Score Evidence</button>
        <div id="evidence-result" class="result-panel hidden"></div>
      </div>

      <div class="scoring-group">
        <h3>H-03 Visual Density</h3>
        <div class="score-grid">
          <label>scene_variety <input type="number" id="vd-scene_variety" value="2" min="0" max="3"></label>
          <label>information_embedding <input type="number" id="vd-information_embedding" value="2" min="0" max="3"></label>
          <label>symbolic_asset <input type="number" id="vd-symbolic_asset" value="2" min="0" max="3"></label>
          <label>tempo_shift <input type="number" id="vd-tempo_shift" value="2" min="0" max="3"></label>
          <label>pattern_balance <input type="number" id="vd-pattern_balance" value="2" min="0" max="3"></label>
          <label>stagnation_risk <input type="number" id="vd-stagnation_risk" value="2" min="0" max="3"></label>
          <label>promise_visual_payoff <input type="number" id="vd-promise_visual_payoff" value="2" min="0" max="3"></label>
        </div>
        <button id="btn-score-visual">Score Visual Density</button>
        <div id="visual-result" class="result-panel hidden"></div>
      </div>
    </section>
  </main>

  <footer>
    <span id="status">Ready</span>
  </footer>

  <script src="renderer.js"></script>
</body>
</html>
